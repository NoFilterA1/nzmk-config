name: Build ZMK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    steps:
      - uses: actions/checkout@v4

      - name: Initialize ZMK workspace
        run: |
          west init -m https://github.com/zmkfirmware/zmk.git --mr main --manifest-file=app/west.yml
          west update
          west zephyr-export

      - name: Build left side
        run: |
          west build -s app -d build/left -b nice_nano -- -DSHIELD=corne_left -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Build right side
        run: |
          west build -s app -p -d build/right -b nice_nano -- -DSHIELD=corne_right -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2
