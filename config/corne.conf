# Corne configuration

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Enable OLED Display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_WIDGET_LAYER_STATUS=y
CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=y  # отключён — нестабилен

# Debounce settings
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# Bluetooth power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_KEYBOARD_NAME="VTwin"

# BLE Security/Pairing
CONFIG_BT_SMP=y
CONFIG_BT_SMP_ENFORCE_MITM=n

# BLE connection parameters (ZMK defaults)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=16
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=300

# External power control
CONFIG_ZMK_EXT_POWER=n

# Mouse / Pointing
CONFIG_ZMK_POINTING=y

# RGB - decouple from ext_power so OLED stays powered
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Per-key per-layer RGB (darknao fork feature)
CONFIG_EXPERIMENTAL_RGB_LAYER=y
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=5
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100

# Sleep / Idle - disable sleep to prevent lag on wake
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n

# Display - keep screen on
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n
