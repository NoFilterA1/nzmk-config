name: Build ZMK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    steps:
      - uses: actions/checkout@v4

      - name: Initialize ZMK workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build left side
        run: |
          west build -s zmk/app -d build/left -b nice_nano_v2//zmk -- -DSHIELD=corne_left -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Dump RGB devicetree (left)
        run: |
          echo "=== underglow ===" && grep -i underglow build/left/zephyr/zephyr.dts || true
          echo "=== ws2812 ===" && grep -i ws2812 build/left/zephyr/zephyr.dts || true
          echo "=== spi3 ===" && grep -A 20 "spi3" build/left/zephyr/zephyr.dts || true
          echo "=== led nodes ===" && grep -i "led_strip\|led-strip\|rgb" build/left/zephyr/zephyr.dts || true

      - name: Build right side
        run: |
          west build -s zmk/app -p -d build/right -b nice_nano_v2//zmk -- -DSHIELD=corne_right -DZMK_CONFIG=$GITHUB_WORKSPACE/config

      - name: Dump RGB devicetree (right)
        run: |
          echo "=== underglow ===" && grep -i underglow build/right/zephyr/zephyr.dts || true
          echo "=== ws2812 ===" && grep -i ws2812 build/right/zephyr/zephyr.dts || true
          echo "=== spi3 ===" && grep -A 20 "spi3" build/right/zephyr/zephyr.dts || true
          echo "=== led nodes ===" && grep -i "led_strip\|led-strip\|rgb" build/right/zephyr/zephyr.dts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            build/left/zephyr/zmk.uf2
            build/right/zephyr/zmk.uf2
